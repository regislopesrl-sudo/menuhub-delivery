version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: sistema_delivery_futuro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_delivery_futuro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_futuro_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sistema_delivery_futuro_redis
    restart: unless-stopped
    ports:
      - '6381:6379'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sistema_delivery_futuro_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3100
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sistema_delivery_futuro?schema=public
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3100:3100'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sistema_delivery_futuro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3100
    ports:
      - '3101:3000'

volumes:
  postgres_futuro_data:


version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: menuhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_delivery_futuro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_futuro_data:/var/lib/postgresql/data
    networks:
      - menuhub_net

  redis:
    image: redis:7
    container_name: menuhub_redis
    restart: unless-stopped
    volumes:
      - redis_futuro_data:/data
    networks:
      - menuhub_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: menuhub_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3100
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    expose:
      - '3100'
    networks:
      - menuhub_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.menuhub.net.br/api}
    container_name: menuhub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.menuhub.net.br/api}
    expose:
      - '3000'
    networks:
      - menuhub_net

volumes:
  postgres_futuro_data:
  redis_futuro_data:

networks:
  menuhub_net:
